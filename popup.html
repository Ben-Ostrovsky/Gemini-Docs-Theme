<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gemini Stealth</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24" width="22" height="22">
      <path fill="#4285F4" d="M6 2a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6H6z"/>
      <path fill="#A1C2FA" d="M14 2l6 6h-4a2 2 0 01-2-2V2z"/>
      <path fill="#fff" d="M7 13h10v1.5H7zm0 3h7v1.5H7z"/>
    </svg>
    <span>Gemini Stealth</span>
  </div>

  <div class="status" id="status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Not on gemini.google.com</span>
  </div>

  <div class="row">
    <div class="row-text">
      <div class="row-title">Stealth mode</div>
      <div class="row-sub">Disguise Gemini as Docs</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="stealthToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="row">
    <div class="row-text">
      <div class="row-title">Keyboard shortcut</div>
      <div class="row-sub"><kbd id="shortcutLabel">⌘ ⇧ G</kbd> to toggle</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="shortcutToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="footer">
    Only active on gemini.google.com
  </div>

  <script src="popup.js"></script>
</body>
</html>
